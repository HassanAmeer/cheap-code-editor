name: Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check existing issues to avoid duplicates.

        **Tip:** Before submitting, check that your report doesn't include any sensitive information (API keys, credentials, proprietary code).
  - type: input
    id: version
    attributes:
      label: Cheap version
      description: Output of `cheap --version`
      placeholder: "e.g. v0.0.84"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: "e.g. macOS 14, arm64"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `cheap ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction-command
    attributes:
      label: Reproduction command
      description: |
        A one-liner that reproduces the issue. Pin the model with `--provider` and `--model` for consistency.
      placeholder: |
        cheap -p "your prompt here" --provider cheap-dev --model kimi-k2.5
      render: shell
    validations:
      required: true
  - type: textarea
    id: session-file
    attributes:
      label: Session file
      description: |
        If the bug occurred during an interactive session, paste the session file path. You can also export it to HTML for easier sharing: `cheap --export <path-to-session.jsonl>`
      placeholder: ~/.config/cheap/harness/sessions/--path--/session.jsonl
    validations:
      required: false
  - type: textarea
    id: json-event-stream
    attributes:
      label: JSON event stream
      description: |
        Optional. Re-run your reproduction command with `--mode json --no-session` to capture a machine-readable event trace:
        ```
        cheap --mode json -p "your prompt" --no-session --provider cheap-dev --model kimi-k2.5 > events.jsonl
        ```
        Paste the contents or attach the file.
      render: json
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
